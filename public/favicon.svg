<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- 卷轴风格图标 -->
  <rect x="8" y="12" width="48" height="40" rx="4" fill="#F5E6C8" stroke="#8B6914" stroke-width="2"/>
  <!-- 毛笔痕迹 - 简化 "国" 字 -->
  <rect x="18" y="20" width="28" height="24" rx="1" fill="none" stroke="#2C1810" stroke-width="2.5"/>
  <line x1="24" y1="26" x2="40" y2="26" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="32" x2="40" y2="32" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <line x1="24" y1="38" x2="40" y2="38" stroke="#2C1810" stroke-width="2" stroke-linecap="round"/>
  <!-- 顶部卷轴装饰 -->
  <rect x="6" y="8" width="52" height="8" rx="4" fill="#8B6914"/>
  <rect x="6" y="48" width="52" height="8" rx="4" fill="#8B6914"/>
